<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form </title>
    <link rel="stylesheet" href="style/quiz.css">
</head>
<body>
    <main>
        <h1>✅ Basic HTML and CSS Quiz</h1>
        <form action="">
            <div class="quiz">
                <label for="Q1">1. What does HTML stand for?</label>
                <input type="text" id="Q1" name="Q1" placeholder="that´s means...?">
            </div>
            <div class="quiz">
                <label for="Q2">2. What does CSS stand for?</label>
                <textarea type="text" id="Q2" name="Q2" placeholder="that´s means...?"></textarea>
            </div>
            <div class="quiz">
                <label for="Q3">3. which of the following options is a valid option? What is the correct HTML element for inserting a line comment?</label>
                <select type="text" id="Q3" name="Q3" placeholder="that´s...?">
                    <option value="" selected disabled></option>
                    <option value="a"><!--this is a comment--></option>
                    <option value="b"> </option>
                    <option value="c"> </option>
                </select>
            </div>
            <div class="quiz">
                <label for="Q4">4. What is the correct CSS syntax for selecting an element with the ID "header"?</label>
                <input type="text" id="Q4" name="Q4" placeholder="that´s...?">
            </div>

        </form>

    </main>

</body>
</html>
